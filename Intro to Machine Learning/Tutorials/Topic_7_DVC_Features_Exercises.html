<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Topic 7 · DVC, Features &amp; Deployment — Exercises</title>
<style>
:root {
  --c-bg:        #f7f9fc;
  --c-card:      #ffffff;
  --c-text:      #1f2937;
  --c-text-soft: #4b5563;
  --c-muted:     #6b7280;
  --c-line:      #e5e7eb;
  --c-primary:   #1f3864;
  --c-accent:    #2e5597;
  --c-soft-blue: #d9e2f3;
  --c-code-bg:   #f1f4f9;
  --c-code-text: #0f172a;
  --c-success:   #16a34a;
  --c-success-bg:#dcfce7;
  --c-warn:      #b45309;
  --c-warn-bg:   #fef3c7;
  --c-error:     #b91c1c;
  --c-error-bg:  #fee2e2;
  --radius:      10px;
  --shadow:      0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--c-bg);
  color: var(--c-text);
  font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
}
.page { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }
header.brand {
  display: flex; align-items: baseline; gap: 12px;
  border-bottom: 1px solid var(--c-line); padding-bottom: 16px; margin-bottom: 28px;
}
header.brand .crumb { color: var(--c-muted); font-size: 13px; }
h1, h2, h3, h4 { color: var(--c-primary); margin: 1.4em 0 .5em; line-height: 1.25; }
h1 { font-size: 28px; margin-top: 0; }
h2 { font-size: 22px; border-bottom: 1px solid var(--c-line); padding-bottom: 6px; }
h3 { font-size: 18px; }
h4 { font-size: 16px; color: var(--c-accent); }
p, li { color: var(--c-text); }
.lead { color: var(--c-text-soft); font-size: 17px; }
.card {
  background: var(--c-card); border: 1px solid var(--c-line);
  border-radius: var(--radius); padding: 20px 22px; margin: 16px 0;
  box-shadow: var(--shadow);
}
.callout {
  background: var(--c-soft-blue);
  border-left: 4px solid var(--c-accent);
  padding: 12px 16px; border-radius: 6px; margin: 14px 0;
  font-size: 15px;
}
.callout.warn { background: var(--c-warn-bg); border-color: var(--c-warn); }
.callout strong.label { color: var(--c-primary); }
code, pre, kbd, samp {
  font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}
code { background: var(--c-code-bg); padding: 1px 6px; border-radius: 4px; font-size: 14px; }
pre {
  background: var(--c-code-bg); color: var(--c-code-text);
  padding: 14px 16px; border-radius: 8px; overflow-x: auto;
  font-size: 14px; line-height: 1.55;
  border: 1px solid var(--c-line);
}
pre code { background: transparent; padding: 0; }
.btn {
  display: inline-block; padding: 8px 14px; font-size: 14px;
  background: var(--c-primary); color: #fff; border: none;
  border-radius: 6px; cursor: pointer; font-weight: 600;
}
.btn:hover { background: var(--c-accent); }
.btn.ghost {
  background: #fff; color: var(--c-primary);
  border: 1px solid var(--c-primary);
}
.btn.ghost:hover { background: var(--c-soft-blue); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
input[type=text], input[type=number], select, textarea {
  font: inherit; padding: 6px 10px; border: 1px solid var(--c-line);
  border-radius: 6px; background: #fff; color: var(--c-text);
}
input[type=range] { width: 100%; }
label.field { display: block; font-size: 14px; color: var(--c-text-soft); margin: 8px 0 4px; }
table.data { border-collapse: collapse; margin: 10px 0; font-size: 14px; }
table.data th, table.data td {
  border: 1px solid var(--c-line); padding: 6px 10px; text-align: left;
}
table.data th { background: var(--c-soft-blue); color: var(--c-primary); }
.row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
.col { flex: 1 1 280px; }
.mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 14px; }
.feedback {
  padding: 10px 14px; border-radius: 6px; margin-top: 10px; font-size: 14px;
  border: 1px solid transparent;
}
.feedback.ok    { background: var(--c-success-bg); border-color: var(--c-success); color: #14532d; }
.feedback.bad   { background: var(--c-error-bg);   border-color: var(--c-error);   color: #7f1d1d; }
.feedback.info  { background: var(--c-soft-blue);  border-color: var(--c-accent);  color: var(--c-primary); }
ul.choices { list-style: none; padding: 0; margin: 8px 0; }
ul.choices li {
  background: #fff; border: 1px solid var(--c-line); padding: 10px 14px;
  border-radius: 6px; margin: 6px 0; cursor: pointer; font-size: 15px;
}
ul.choices li:hover { background: var(--c-soft-blue); }
ul.choices li.selected { background: var(--c-soft-blue); border-color: var(--c-primary); }
ul.choices li.correct  { background: var(--c-success-bg); border-color: var(--c-success); }
ul.choices li.incorrect{ background: var(--c-error-bg);   border-color: var(--c-error); }
.progress {
  background: var(--c-line); border-radius: 4px; height: 6px;
  overflow: hidden; margin: 8px 0;
}
.progress > div {
  background: var(--c-accent); height: 100%;
  transition: width .35s ease;
}
svg.chart { display: block; max-width: 100%; height: auto; }
.legend { display: flex; gap: 12px; font-size: 13px; color: var(--c-text-soft); margin: 6px 0; }
.legend span.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
footer.brand {
  margin-top: 60px; padding-top: 16px; border-top: 1px solid var(--c-line);
  color: var(--c-muted); font-size: 13px; text-align: center;
}
.tag {
  display: inline-block; padding: 2px 8px; font-size: 12px; font-weight: 600;
  border-radius: 999px; background: var(--c-soft-blue); color: var(--c-primary);
  margin-right: 6px;
}
.scope {
  font-size: 13px; color: var(--c-muted); font-style: italic;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="page">
  <header class="brand">
    <span class="tag">Machine Learning</span>
    <span class="crumb">Exercises · Topic 7</span>
  </header>
  
<h1>Topic 7 · Practice Exercises</h1>
<p class="lead">
  Eight exercises on DVC, feature engineering, ColumnTransformer / Pipeline,
  and the two-tier deployment trade-off.
</p>
<div id="ex-root"></div>

  <footer class="brand">© 2026 · Intro to Machine Learning</footer>
</div>
<script>
// ---- exercise framework ----
function el(tag, attrs, ...kids){
  const e = document.createElement(tag);
  for (const k in (attrs||{})) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] !== false && attrs[k] != null) e.setAttribute(k, attrs[k]);
  }
  for (const kid of kids.flat()) {
    if (kid == null) continue;
    e.appendChild(kid.nodeType ? kid : document.createTextNode(kid));
  }
  return e;
}
function feedback(host, kind, msg){
  let f = host.querySelector('.feedback');
  if (!f) { f = el('div', {class:'feedback'}); host.appendChild(f); }
  f.className = 'feedback ' + kind;
  f.innerHTML = msg;
}
function renderMCQ(host, q){
  host.appendChild(el('p', {class:'lead'}, q.stem));
  const ul = el('ul', {class:'choices'});
  let answered = false;
  q.choices.forEach((c, i) => {
    const li = el('li', {tabindex:'0'}, c);
    li.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      Array.from(ul.children).forEach(x => x.classList.remove('selected'));
      li.classList.add('selected');
      if (i === q.answer) {
        li.classList.add('correct');
        feedback(host, 'ok', '<strong>Correct.</strong> ' + (q.rationale||''));
      } else {
        li.classList.add('incorrect');
        ul.children[q.answer].classList.add('correct');
        feedback(host, 'bad', '<strong>Not quite.</strong> The correct answer is highlighted in green. ' + (q.rationale||''));
      }
    });
    ul.appendChild(li);
  });
  host.appendChild(ul);
}
function renderTextEx(host, q){
  host.appendChild(el('p', {class:'lead'}, q.stem));
  const input = el('input', {type:'text', placeholder: q.placeholder || 'Your answer…', style:'width:60%;'});
  const btn = el('button', {class:'btn'}, 'Check');
  const row = el('div', {class:'btn-row'}, input, btn);
  host.appendChild(row);
  btn.addEventListener('click', () => {
    const v = (input.value || '').trim();
    if (q.check(v)) feedback(host, 'ok', '<strong>Correct.</strong> ' + (q.rationale||''));
    else feedback(host, 'bad', '<strong>Not quite.</strong> ' + (q.hint||q.rationale||''));
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
}
function buildExerciseSet(rootSel, items){
  const root = document.querySelector(rootSel);
  let correct = 0, attempted = 0;
  items.forEach((q, idx) => {
    const card = el('div', {class:'card'});
    card.appendChild(el('h3', {}, 'Exercise ' + (idx+1) + ' — ' + q.type));
    if (q.kind === 'mcq') renderMCQ(card, q);
    else if (q.kind === 'text') renderTextEx(card, q);
    else if (q.kind === 'custom') q.render(card);
    root.appendChild(card);
  });
}
</script>
<script>
const items = [
  { type:'DVC', kind:'mcq',
    stem:'Which best describes what DVC adds on top of plain Git?',
    choices:[
      'It replaces Git as the version-control system for source code.',
      'It keeps small "pointer" files in Git and stores the actual binary contents (data, models) on a separate remote (S3, GCS, SSH).',
      'It encrypts the repository.',
      'It compresses Python source code.',
      'It is a frontend for SQLite.',
    ],
    answer:1,
    rationale:'DVC = pointer files in Git + content on a separate remote.' },

  { type:'DVC', kind:'mcq',
    stem:'You change src/featurize.py. Which stages will dvc repro re-run, given the standard prepare → featurize → train pipeline?',
    choices:[
      'All three stages — DVC always re-runs the whole DAG.',
      'Only featurize and train — prepare\'s deps did not change, so its cached output is reused.',
      'Only featurize.',
      'Only train.',
      'None — DVC only re-runs when raw data changes.',
    ],
    answer:1,
    rationale:'DVC walks the DAG and re-runs ONLY stages whose declared inputs have changed.' },

  { type:'Feature Eng', kind:'mcq',
    stem:'A column "city" has 8,000 distinct values across 50,000 rows. Which introductory encoding is most appropriate?',
    choices:[
      'One-hot encoding — produces 8,000 binary columns.',
      'Frequency encoding (or grouping to county/state level) — avoids the explosion of one-hot for high-cardinality columns.',
      'Target encoding with out-of-fold smoothing.',
      'Polynomial interaction features of city × city.',
      'Drop the column without any analysis.',
    ],
    answer:1,
    rationale:'Frequency encoding is the introductory alternative to naive one-hot for high-cardinality columns.' },

  { type:'Feature Eng', kind:'mcq',
    stem:'Why is np.log1p(x) often preferred over np.log(x) for a long-tailed numeric column?',
    choices:[
      'log1p runs 100× faster.',
      'log1p(x) computes log(1 + x), which is defined for x = 0 (no domain error).',
      'log1p uses fewer bytes of memory.',
      'log is deprecated in NumPy.',
      'log1p is required by scikit-learn.',
    ],
    answer:1,
    rationale:'log1p safely handles zero values; plain log(0) is −∞.' },

  { type:'Pipeline', kind:'mcq',
    stem:'Which sklearn idiom is the most defensible way to apply DIFFERENT preprocessing to numeric and categorical columns in the same model?',
    choices:[
      'Hand-write two Pipelines and concatenate their outputs in pandas.',
      'Use a ColumnTransformer that routes numeric columns through StandardScaler/SimpleImputer and categorical columns through OneHotEncoder, wrapped in a single outer Pipeline with the final estimator.',
      'Cast every column to string and use OneHotEncoder uniformly.',
      'Use a single StandardScaler on every column.',
      'Skip preprocessing entirely.',
    ],
    answer:1,
    rationale:'ColumnTransformer + Pipeline is the canonical, leakage-safe tabular preprocessing recipe.' },

  { type:'Honesty', kind:'mcq',
    stem:'After light feature selection, your engineered model has HIGHER test RMSE than the baseline. The most product-aligned response is to…',
    choices:[
      'Ship the engineered model unconditionally.',
      'Investigate honestly, decide whether to ship the baseline or the engineered model with documented caveats, and report the result in the README either way.',
      'Drop test rows until the engineered model wins.',
      'Re-run with a different random seed until the engineered model wins.',
      'Quietly delete the comparison from the README.',
    ],
    answer:1,
    rationale:'Honest reporting of negative results is part of professional product work.' },

  { type:'Deploy', kind:'mcq',
    stem:'What do you gain — and what do you give up — by splitting a Streamlit UI from a FastAPI /predict service?',
    choices:[
      'Gain: nothing. Give up: nothing. The split is decorative.',
      'Gain: independent deploys, shareable scoring across consumers. Give up: per-request network latency and one new failure mode (the service can be down).',
      'Gain: 10× speed. Give up: nothing.',
      'Gain: lower hosting cost. Give up: data persistence.',
      'Gain: AI auto-tuning. Give up: control.',
    ],
    answer:1,
    rationale:'Separation of concerns enables independent iteration; the cost is latency and a new failure mode.' },

  { type:'Persist', kind:'text',
    stem:'Which Python library is the recommended serializer for a trained scikit-learn Pipeline? (Type just the library name.)',
    placeholder:'library name only',
    check: v => v.replace(/[^a-z]/gi, '').toLowerCase() === 'joblib',
    rationale:'joblib.dump / joblib.load handle NumPy arrays efficiently and are the recommended sklearn-object serializer.' },
];
buildExerciseSet('#ex-root', items);
</script>
</body>
</html>

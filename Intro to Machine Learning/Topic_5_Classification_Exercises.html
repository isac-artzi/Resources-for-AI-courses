<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Topic 5 · Classification — Exercises</title>
<style>
:root {
  --c-bg:        #f7f9fc;
  --c-card:      #ffffff;
  --c-text:      #1f2937;
  --c-text-soft: #4b5563;
  --c-muted:     #6b7280;
  --c-line:      #e5e7eb;
  --c-primary:   #1f3864;
  --c-accent:    #2e5597;
  --c-soft-blue: #d9e2f3;
  --c-code-bg:   #f1f4f9;
  --c-code-text: #0f172a;
  --c-success:   #16a34a;
  --c-success-bg:#dcfce7;
  --c-warn:      #b45309;
  --c-warn-bg:   #fef3c7;
  --c-error:     #b91c1c;
  --c-error-bg:  #fee2e2;
  --radius:      10px;
  --shadow:      0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--c-bg);
  color: var(--c-text);
  font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
}
.page { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }
header.brand {
  display: flex; align-items: baseline; gap: 12px;
  border-bottom: 1px solid var(--c-line); padding-bottom: 16px; margin-bottom: 28px;
}
header.brand .crumb { color: var(--c-muted); font-size: 13px; }
h1, h2, h3, h4 { color: var(--c-primary); margin: 1.4em 0 .5em; line-height: 1.25; }
h1 { font-size: 28px; margin-top: 0; }
h2 { font-size: 22px; border-bottom: 1px solid var(--c-line); padding-bottom: 6px; }
h3 { font-size: 18px; }
h4 { font-size: 16px; color: var(--c-accent); }
p, li { color: var(--c-text); }
.lead { color: var(--c-text-soft); font-size: 17px; }
.card {
  background: var(--c-card); border: 1px solid var(--c-line);
  border-radius: var(--radius); padding: 20px 22px; margin: 16px 0;
  box-shadow: var(--shadow);
}
.callout {
  background: var(--c-soft-blue);
  border-left: 4px solid var(--c-accent);
  padding: 12px 16px; border-radius: 6px; margin: 14px 0;
  font-size: 15px;
}
.callout.warn { background: var(--c-warn-bg); border-color: var(--c-warn); }
.callout strong.label { color: var(--c-primary); }
code, pre, kbd, samp {
  font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}
code { background: var(--c-code-bg); padding: 1px 6px; border-radius: 4px; font-size: 14px; }
pre {
  background: var(--c-code-bg); color: var(--c-code-text);
  padding: 14px 16px; border-radius: 8px; overflow-x: auto;
  font-size: 14px; line-height: 1.55;
  border: 1px solid var(--c-line);
}
pre code { background: transparent; padding: 0; }
.btn {
  display: inline-block; padding: 8px 14px; font-size: 14px;
  background: var(--c-primary); color: #fff; border: none;
  border-radius: 6px; cursor: pointer; font-weight: 600;
}
.btn:hover { background: var(--c-accent); }
.btn.ghost {
  background: #fff; color: var(--c-primary);
  border: 1px solid var(--c-primary);
}
.btn.ghost:hover { background: var(--c-soft-blue); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
input[type=text], input[type=number], select, textarea {
  font: inherit; padding: 6px 10px; border: 1px solid var(--c-line);
  border-radius: 6px; background: #fff; color: var(--c-text);
}
input[type=range] { width: 100%; }
label.field { display: block; font-size: 14px; color: var(--c-text-soft); margin: 8px 0 4px; }
table.data { border-collapse: collapse; margin: 10px 0; font-size: 14px; }
table.data th, table.data td {
  border: 1px solid var(--c-line); padding: 6px 10px; text-align: left;
}
table.data th { background: var(--c-soft-blue); color: var(--c-primary); }
.row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
.col { flex: 1 1 280px; }
.mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 14px; }
.feedback {
  padding: 10px 14px; border-radius: 6px; margin-top: 10px; font-size: 14px;
  border: 1px solid transparent;
}
.feedback.ok    { background: var(--c-success-bg); border-color: var(--c-success); color: #14532d; }
.feedback.bad   { background: var(--c-error-bg);   border-color: var(--c-error);   color: #7f1d1d; }
.feedback.info  { background: var(--c-soft-blue);  border-color: var(--c-accent);  color: var(--c-primary); }
ul.choices { list-style: none; padding: 0; margin: 8px 0; }
ul.choices li {
  background: #fff; border: 1px solid var(--c-line); padding: 10px 14px;
  border-radius: 6px; margin: 6px 0; cursor: pointer; font-size: 15px;
}
ul.choices li:hover { background: var(--c-soft-blue); }
ul.choices li.selected { background: var(--c-soft-blue); border-color: var(--c-primary); }
ul.choices li.correct  { background: var(--c-success-bg); border-color: var(--c-success); }
ul.choices li.incorrect{ background: var(--c-error-bg);   border-color: var(--c-error); }
.progress {
  background: var(--c-line); border-radius: 4px; height: 6px;
  overflow: hidden; margin: 8px 0;
}
.progress > div {
  background: var(--c-accent); height: 100%;
  transition: width .35s ease;
}
svg.chart { display: block; max-width: 100%; height: auto; }
.legend { display: flex; gap: 12px; font-size: 13px; color: var(--c-text-soft); margin: 6px 0; }
.legend span.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
footer.brand {
  margin-top: 60px; padding-top: 16px; border-top: 1px solid var(--c-line);
  color: var(--c-muted); font-size: 13px; text-align: center;
}
.tag {
  display: inline-block; padding: 2px 8px; font-size: 12px; font-weight: 600;
  border-radius: 999px; background: var(--c-soft-blue); color: var(--c-primary);
  margin-right: 6px;
}
.scope {
  font-size: 13px; color: var(--c-muted); font-style: italic;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="page">
  <header class="brand">
    <span class="tag">Machine Learning</span>
    <span class="crumb">Exercises · Topic 5</span>
  </header>
  
<h1>Topic 5 · Practice Exercises</h1>
<p class="lead">
  Eight exercises on classifier intuition, scaling, ROC, and reading
  confusion matrices.
</p>
<div id="ex-root"></div>

  <footer class="brand">© 2026 · Intro to Machine Learning</footer>
</div>
<script>
// ---- exercise framework ----
function el(tag, attrs, ...kids){
  const e = document.createElement(tag);
  for (const k in (attrs||{})) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] !== false && attrs[k] != null) e.setAttribute(k, attrs[k]);
  }
  for (const kid of kids.flat()) {
    if (kid == null) continue;
    e.appendChild(kid.nodeType ? kid : document.createTextNode(kid));
  }
  return e;
}
function feedback(host, kind, msg){
  let f = host.querySelector('.feedback');
  if (!f) { f = el('div', {class:'feedback'}); host.appendChild(f); }
  f.className = 'feedback ' + kind;
  f.innerHTML = msg;
}
function renderMCQ(host, q){
  host.appendChild(el('p', {class:'lead'}, q.stem));
  const ul = el('ul', {class:'choices'});
  let answered = false;
  q.choices.forEach((c, i) => {
    const li = el('li', {tabindex:'0'}, c);
    li.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      Array.from(ul.children).forEach(x => x.classList.remove('selected'));
      li.classList.add('selected');
      if (i === q.answer) {
        li.classList.add('correct');
        feedback(host, 'ok', '<strong>Correct.</strong> ' + (q.rationale||''));
      } else {
        li.classList.add('incorrect');
        ul.children[q.answer].classList.add('correct');
        feedback(host, 'bad', '<strong>Not quite.</strong> The correct answer is highlighted in green. ' + (q.rationale||''));
      }
    });
    ul.appendChild(li);
  });
  host.appendChild(ul);
}
function renderTextEx(host, q){
  host.appendChild(el('p', {class:'lead'}, q.stem));
  const input = el('input', {type:'text', placeholder: q.placeholder || 'Your answer…', style:'width:60%;'});
  const btn = el('button', {class:'btn'}, 'Check');
  const row = el('div', {class:'btn-row'}, input, btn);
  host.appendChild(row);
  btn.addEventListener('click', () => {
    const v = (input.value || '').trim();
    if (q.check(v)) feedback(host, 'ok', '<strong>Correct.</strong> ' + (q.rationale||''));
    else feedback(host, 'bad', '<strong>Not quite.</strong> ' + (q.hint||q.rationale||''));
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
}
function buildExerciseSet(rootSel, items){
  const root = document.querySelector(rootSel);
  let correct = 0, attempted = 0;
  items.forEach((q, idx) => {
    const card = el('div', {class:'card'});
    card.appendChild(el('h3', {}, 'Exercise ' + (idx+1) + ' — ' + q.type));
    if (q.kind === 'mcq') renderMCQ(card, q);
    else if (q.kind === 'text') renderTextEx(card, q);
    else if (q.kind === 'custom') q.render(card);
    root.appendChild(card);
  });
}
</script>
<script>
const items = [
  { type:'Theory', kind:'mcq',
    stem:'Why is feature scaling essential for kNN and SVM but not for decision trees?',
    choices:[
      'Decision trees only run on standardized data; kNN ignores scale entirely.',
      'kNN and SVM use distance / similarity, so a feature with a large numeric range dominates; trees split on one feature at a time, so absolute scale is irrelevant.',
      'Both require scaling — the difference is purely cosmetic.',
      'kNN refuses to fit on data with values > 100.',
      'Trees automatically scale features inside scikit-learn.',
    ],
    answer:1,
    rationale:'kNN distances are scale-sensitive; tree splits are scale-invariant.' },

  { type:'Classifier', kind:'mcq',
    stem:'At the introductory level, which describes a Support Vector Machine in plain language?',
    choices:[
      'It memorizes every training point and looks them up at predict time.',
      'It draws the boundary that gives the LARGEST possible gap (margin) between the two classes.',
      'It computes the median of each class and predicts the closer one.',
      'It is identical to LinearRegression.',
      'It only works for image data.',
    ],
    answer:1,
    rationale:'SVM = maximum-margin boundary; the points touching the margin are support vectors.' },

  { type:'Classifier', kind:'mcq',
    stem:'A decision tree with max_depth=5 trained on a 50/50 dataset reports 100% accuracy on the training set and 65% on the test set. The most likely explanation is…',
    choices:[
      'The classifier is broken.',
      'The tree has overfit the training data; depth=5 is still flexible enough to memorize patterns that do not generalize.',
      'The training set is too large.',
      'scikit-learn computed accuracy wrong.',
      'Decision trees can never overfit.',
    ],
    answer:1,
    rationale:'Big train-test gap is the textbook overfitting signal; further limiting depth or pruning often helps.' },

  { type:'Imbalance', kind:'mcq',
    stem:'A classifier on a 95% ham / 5% spam dataset reports 95% accuracy. Why is that NOT impressive on its own?',
    choices:[
      '95% accuracy is mathematically impossible.',
      'A trivial model that always predicts "ham" already scores 95% — you must look at the confusion matrix and per-class recall.',
      'The classifier is poorly initialized.',
      'Accuracy is not defined for binary problems.',
      'Decision trees always score 99% on imbalanced data.',
    ],
    answer:1,
    rationale:'Always-predict-majority gets 95% accuracy with zero recall on the minority class. Look at recall and precision.' },

  { type:'ROC', kind:'mcq',
    stem:'What does ROC-AUC = 0.5 mean in plain language?',
    choices:[
      'The model gets 50% accuracy regardless of threshold.',
      'The model has no ranking ability beyond random guessing — a randomly chosen positive is no more likely than a randomly chosen negative to receive a higher score.',
      'The model is exactly half-right.',
      'The model is well-calibrated but cannot make predictions.',
      'The model is mathematically inverted.',
    ],
    answer:1,
    rationale:'AUC = 0.5 means random ranking; AUC = 1.0 means perfect ranking.' },

  { type:'Comparison', kind:'mcq',
    stem:'You trained kNN, SVM, and a decision tree. AUCs are 0.91, 0.93, and 0.88. The introductory recommendation should:',
    choices:[
      'Pick whichever classifier you trained first.',
      'Lead with the SVM (highest AUC), but also note precision/recall/F1 and engineering considerations (training time, interpretability) before finalizing the recommendation in the README.',
      'Pick whichever has the shortest class name.',
      'Use a formal McNemar paired statistical test and only ship if p < 0.05.',
      'Refuse to recommend anything until AUC ≥ 0.99.',
    ],
    answer:1,
    rationale:'Side-by-side metric comparison plus engineering criteria — formal paired tests are out of scope at the introductory level.' },

  { type:'Code', kind:'mcq',
    stem:'Which snippet correctly wraps a kNN classifier in a leakage-safe Pipeline?',
    choices:[
      'Pipeline([("knn", KNeighborsClassifier())])',
      'Pipeline([("scale", StandardScaler()), ("knn", KNeighborsClassifier())])',
      'KNeighborsClassifier().fit(X.dropna(), y.dropna())',
      'Pipeline([("knn", KNeighborsClassifier()), ("scale", StandardScaler())])',
      'StandardScaler().fit_transform(X_test)',
    ],
    answer:1,
    rationale:'Scaler must come BEFORE the model in the Pipeline so the scaler is fit on training folds only during CV.' },

  { type:'Metric', kind:'text',
    stem:'TP=30, FN=30. What is recall on the positive class? (Type the number rounded to two decimals.)',
    placeholder:'e.g. 0.50',
    check: v => Math.abs(parseFloat(v) - 0.50) < 0.005,
    rationale:'Recall = TP / (TP + FN) = 30 / 60 = 0.50.' },
];
buildExerciseSet('#ex-root', items);
</script>
</body>
</html>
